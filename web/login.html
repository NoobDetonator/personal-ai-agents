<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Personal AI Agents</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="foundations.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="login-brand"><span class="login-brand__mark" aria-hidden="true"></span><span>Agents<b>.</b></span></div>
      <div class="login-copy">
        <span class="ds-badge ds-badge--success">Conexão protegida</span>
        <h1 id="login-title">Acesse seu ambiente agêntico</h1>
        <p>Entre com a senha configurada no servidor. A sessão expira automaticamente e ações sensíveis são auditadas.</p>
      </div>
      <form id="login-form" class="login-form">
        <label class="ds-label" for="login-password">Senha</label>
        <input class="ds-input" id="login-password" name="password" type="password" minlength="12" autocomplete="current-password" required autofocus>
        <p id="login-error" class="login-error hidden" role="alert"></p>
        <button class="ds-btn ds-btn--primary ds-btn--lg" id="login-submit" type="submit">Entrar com segurança</button>
      </form>
      <p class="login-foot">Use Tailscale ou um reverse proxy HTTPS. Nunca exponha a porta 3131 diretamente.</p>
    </section>
  </main>
  <script src="login.js"></script>
</body>
</html>
